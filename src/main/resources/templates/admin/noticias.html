<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <div class="max-w-7xl mx-auto px-4 py-6 flex-1 w-full">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Gestión de Artículos</h2>

        <div th:if="${mensaje}"
             class="bg-green-50 border border-green-300 text-green-700 px-4 py-3 rounded text-sm mb-4"
             th:text="${mensaje}"></div>
        <div th:if="${error}"
             class="bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded text-sm mb-4"
             th:text="${error}"></div>

        <div class="bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-blue-800 text-white">
                    <tr>
                        <th class="px-4 py-3 text-left font-medium">Título</th>
                        <th class="px-4 py-3 text-left font-medium">Autor</th>
                        <th class="px-4 py-3 text-left font-medium">Tema</th>
                        <th class="px-4 py-3 text-left font-medium">Estado</th>
                        <th class="px-4 py-3 text-left font-medium">Fecha</th>
                        <th class="px-4 py-3 text-left font-medium">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="n : ${noticias}" class="hover:bg-gray-50">
                        <td class="px-4 py-3">
                            <a th:href="@{/noticias/{id}(id=${n.idNoticia})}"
                               th:text="${n.titulo}"
                               class="text-blue-600 hover:underline">-</a>
                        </td>
                        <td class="px-4 py-3 text-gray-600" th:text="${n.nombreAutor}">-</td>
                        <td class="px-4 py-3 text-gray-600" th:text="${n.nombreTema}">-</td>
                        <td class="px-4 py-3">
                            <span th:classappend="'estado-badge-' + ${n.estado}"
                                  th:text="${n.estado}">-</span>
                        </td>
                        <td class="px-4 py-3 text-gray-600"
                            th:text="${n.fechaCreacion != null ? #dates.format(n.fechaCreacion,'dd/MM/yyyy') : '-'}">-</td>
                        <td class="px-4 py-3">
                            <div class="flex items-center gap-1">
                                <a th:href="@{/admin/noticias/{id}/editar(id=${n.idNoticia})}"
                                   class="border border-blue-600 text-blue-600 hover:bg-blue-600 hover:text-white text-xs px-2 py-1 rounded transition-colors">
                                    Editar
                                </a>
                                <form th:action="@{/admin/noticias/{id}/eliminar(id=${n.idNoticia})}"
                                      method="post" class="inline"
                                      onsubmit="return confirm('¿Eliminar artículo?')">
                                    <button type="submit"
                                            class="border border-red-600 text-red-600 hover:bg-red-600 hover:text-white text-xs px-2 py-1 rounded transition-colors">
                                        Eliminar
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
