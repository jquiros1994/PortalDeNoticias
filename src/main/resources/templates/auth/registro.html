<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <div class="max-w-lg mx-auto px-4 py-12 w-full flex-1">
        <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-6">
            <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Crear Cuenta</h2>

            <div th:if="${error}"
                 class="bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded text-sm mb-4"
                 th:text="${error}"></div>

            <form th:action="@{/registro}" method="post" class="space-y-4">
                <div>
                    <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required autofocus maxlength="100"
                           class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="apellidos" class="block text-sm font-medium text-gray-700 mb-1">Apellidos</label>
                    <input type="text" id="apellidos" name="apellidos" required maxlength="100"
                           class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" name="email" required maxlength="150"
                           class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                        Contraseña <span class="text-gray-400 font-normal">(máx. 16 caracteres)</span>
                    </label>
                    <input type="password" id="password" name="password" required maxlength="16"
                           class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit"
                        class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded font-medium transition-colors">
                    Registrarse
                </button>
            </form>

            <hr class="my-4">
            <p class="text-center text-sm text-gray-600">
                ¿Ya tienes cuenta?
                <a href="/login" class="text-blue-600 hover:underline">Inicia sesión aquí</a>
            </p>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
