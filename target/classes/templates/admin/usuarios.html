<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <div class="max-w-7xl mx-auto px-4 py-6 flex-1 w-full">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Gestión de Usuarios</h2>

        <div th:if="${mensaje}"
             class="bg-green-50 border border-green-300 text-green-700 px-4 py-3 rounded text-sm mb-4"
             th:text="${mensaje}"></div>
        <div th:if="${error}"
             class="bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded text-sm mb-4"
             th:text="${error}"></div>

        <!-- Create user form -->
        <div class="bg-white border border-gray-200 rounded-lg shadow-sm mb-6">
            <div class="px-4 py-3 bg-gray-50 border-b border-gray-200 font-semibold text-sm text-gray-700">Nuevo Usuario</div>
            <div class="p-4">
                <form th:action="@{/admin/usuarios/nuevo}" method="post" class="flex flex-wrap gap-2">
                    <input type="text" name="nombre" placeholder="Nombre" required
                           class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 flex-1 min-w-[120px]">
                    <input type="text" name="apellidos" placeholder="Apellidos" required
                           class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 flex-1 min-w-[120px]">
                    <input type="email" name="email" placeholder="Email" required
                           class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 flex-1 min-w-[160px]">
                    <input type="password" name="password" placeholder="Contraseña" maxlength="16" required
                           class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 flex-1 min-w-[120px]">
                    <select name="rol" required
                            class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="LECTOR">LECTOR</option>
                        <option value="AUTOR">AUTOR</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                    <button type="submit"
                            class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-sm font-medium transition-colors">
                        Crear
                    </button>
                </form>
            </div>
        </div>

        <!-- User list -->
        <div class="bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-blue-800 text-white">
                    <tr>
                        <th class="px-4 py-3 text-left font-medium">Nombre</th>
                        <th class="px-4 py-3 text-left font-medium">Email</th>
                        <th class="px-4 py-3 text-left font-medium">Rol</th>
                        <th class="px-4 py-3 text-left font-medium">Activo</th>
                        <th class="px-4 py-3 text-left font-medium">Acción</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr th:each="u : ${usuarios}" class="hover:bg-gray-50">
                        <td class="px-4 py-3 text-gray-700" th:text="${u.nombre + ' ' + u.apellidos}">-</td>
                        <td class="px-4 py-3 text-gray-600" th:text="${u.email}">-</td>
                        <td class="px-4 py-3">
                            <span class="inline-block px-2 py-0.5 text-xs font-semibold rounded bg-gray-500 text-white"
                                  th:text="${u.rol}">-</span>
                        </td>
                        <td class="px-4 py-3">
                            <span th:if="${u.activo == 1}"
                                  class="inline-block px-2 py-0.5 text-xs font-semibold rounded bg-green-600 text-white">Activo</span>
                            <span th:if="${u.activo == 0}"
                                  class="inline-block px-2 py-0.5 text-xs font-semibold rounded bg-red-600 text-white">Inactivo</span>
                        </td>
                        <td class="px-4 py-3">
                            <form th:action="@{/admin/usuarios/{id}/toggleActivo(id=${u.idUsuario})}"
                                  method="post" class="inline">
                                <input type="hidden" name="activo" th:value="${u.activo == 1 ? 0 : 1}">
                                <button type="submit"
                                        th:class="${u.activo == 1} ?
                                            'border border-red-600 text-red-600 hover:bg-red-600 hover:text-white text-xs px-2 py-1 rounded transition-colors' :
                                            'border border-green-600 text-green-600 hover:bg-green-600 hover:text-white text-xs px-2 py-1 rounded transition-colors'"
                                        th:text="${u.activo == 1} ? 'Desactivar' : 'Activar'">Toggle</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
