<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <div class="max-w-md mx-auto px-4 py-12 w-full flex-1">
        <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-6">
            <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Iniciar Sesión</h2>

            <div th:if="${error}"
                 class="bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded text-sm mb-4"
                 th:text="${error}"></div>
            <div th:if="${mensaje}"
                 class="bg-green-50 border border-green-300 text-green-700 px-4 py-3 rounded text-sm mb-4"
                 th:text="${mensaje}"></div>

            <form th:action="@{/login}" method="post" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" name="email" required autofocus
                           class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" id="password" name="password" required
                           class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded font-medium transition-colors">
                    Entrar
                </button>
            </form>

            <hr class="my-4">
            <p class="text-center text-sm text-gray-600">
                ¿No tienes cuenta?
                <a href="/registro" class="text-blue-600 hover:underline">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
