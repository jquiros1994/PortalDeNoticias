<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="bg-blue-900 text-white" x-data="{ mobileOpen: false }">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex items-center justify-between h-14">
            <a class="font-bold text-xl tracking-tight" href="/">Portal de Noticias</a>

            <!-- Mobile hamburger -->
            <button class="md:hidden p-2 rounded hover:bg-blue-700" @click="mobileOpen = !mobileOpen" aria-label="Toggle menu">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>

            <!-- Desktop links -->
            <div class="hidden md:flex items-center space-x-4 text-sm">
                <a class="hover:text-gray-300" href="/">Inicio</a>

                <!-- ADMIN dropdown -->
                <div th:if="${session.usuario != null and session.usuario.rol == 'ADMIN'}"
                     class="relative" x-data="{ open: false }">
                    <button class="flex items-center gap-1 hover:text-gray-300" @click="open = !open">
                        Admin
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
                        </svg>
                    </button>
                    <div x-show="open" @click.outside="open = false" x-cloak
                         class="absolute right-0 mt-2 w-52 bg-white text-gray-800 rounded shadow-lg z-50 border border-gray-200">
                        <a class="block px-4 py-2 hover:bg-gray-100" href="/admin/estadisticas">Estadísticas</a>
                        <a class="block px-4 py-2 hover:bg-gray-100" href="/admin/noticias">Gestionar Artículos</a>
                        <a class="block px-4 py-2 hover:bg-gray-100" href="/admin/usuarios">Gestionar Usuarios</a>
                        <a class="block px-4 py-2 hover:bg-gray-100" href="/admin/temas">Gestionar Temas</a>
                        <a class="block px-4 py-2 hover:bg-gray-100" href="/admin/subtemas">Gestionar Subtemas</a>
                    </div>
                </div>

                <!-- AUTOR link -->
                <a th:if="${session.usuario != null and session.usuario.rol == 'AUTOR'}"
                   class="hover:text-gray-300" href="/autor/dashboard">Mi Dashboard</a>

                <!-- User dropdown -->
                <div th:if="${session.usuario != null}" class="relative" x-data="{ open: false }">
                    <button class="flex items-center gap-1 hover:text-gray-300" @click="open = !open"
                            th:text="${session.usuario.nombre}">Usuario</button>
                    <div x-show="open" @click.outside="open = false" x-cloak
                         class="absolute right-0 mt-2 w-44 bg-white text-gray-800 rounded shadow-lg z-50 border border-gray-200">
                        <span class="block px-4 py-2 text-xs text-gray-500"
                              th:text="${session.usuario.rol}">ROL</span>
                        <hr>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit"
                                    class="w-full text-left px-4 py-2 hover:bg-gray-100 text-sm">
                                Cerrar Sesión
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Unauthenticated -->
                <a th:if="${session.usuario == null}" class="hover:text-gray-300" href="/login">Iniciar Sesión</a>
                <a th:if="${session.usuario == null}"
                   class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded" href="/registro">Registrarse</a>
            </div>
        </div>

        <!-- Mobile menu -->
        <div x-show="mobileOpen" x-cloak class="md:hidden pb-3 space-y-1 text-sm">
            <a class="block px-2 py-1 rounded hover:bg-blue-700" href="/">Inicio</a>

            <div th:if="${session.usuario != null and session.usuario.rol == 'ADMIN'}" class="space-y-1">
                <a class="block px-2 py-1 rounded hover:bg-blue-700" href="/admin/estadisticas">Estadísticas</a>
                <a class="block px-2 py-1 rounded hover:bg-blue-700" href="/admin/noticias">Gestionar Artículos</a>
                <a class="block px-2 py-1 rounded hover:bg-blue-700" href="/admin/usuarios">Gestionar Usuarios</a>
                <a class="block px-2 py-1 rounded hover:bg-blue-700" href="/admin/temas">Gestionar Temas</a>
                <a class="block px-2 py-1 rounded hover:bg-blue-700" href="/admin/subtemas">Gestionar Subtemas</a>
            </div>

            <a th:if="${session.usuario != null and session.usuario.rol == 'AUTOR'}"
               class="block px-2 py-1 rounded hover:bg-blue-700" href="/autor/dashboard">Mi Dashboard</a>

            <div th:if="${session.usuario != null}" class="border-t border-gray-700 pt-2 mt-2 space-y-1">
                <span class="block px-2 py-1 text-xs text-gray-400"
                      th:text="${session.usuario.nombre + ' (' + session.usuario.rol + ')'}">Usuario</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="block w-full text-left px-2 py-1 rounded hover:bg-blue-700">
                        Cerrar Sesión
                    </button>
                </form>
            </div>

            <a th:if="${session.usuario == null}" class="block px-2 py-1 rounded hover:bg-blue-700" href="/login">Iniciar Sesión</a>
            <a th:if="${session.usuario == null}" class="block px-2 py-1 rounded hover:bg-blue-700" href="/registro">Registrarse</a>
        </div>
    </div>
</nav>
</body>
</html>
